<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XBWorld Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0d1117; color: #e6edf3; min-height: 100vh;
    }
    #xb-admin-root { min-height: 100vh; }
    /* Loading state */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 14px; color: #8b949e;
    }
  </style>
</head>
<body>
  <div id="xb-admin-root">
    <div class="loading">Loading XBWorld Admin...</div>
  </div>
  <!-- Admin JS will be injected by Vite build or loaded from web client -->
  <script>
    // Bootstrap: connect to admin API and render dashboard
    // This is a standalone page - it will be populated by admin bundle
    window.ADMIN_BASE_URL = window.location.origin;
  </script>
</body>
</html>
